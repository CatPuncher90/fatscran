<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FatScran — Migration Tool</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Fat<span class="logo-scran">Scran</span></a>
    <ul class="nav-links"></ul>
  </div>
</nav>
<main>
  <div class="page-header">
    <h1>Migration Tool</h1>
    <p>One-time tool to migrate recipes.js into Supabase. Delete this file after running.</p>
  </div>
  <div id="migrate-status" style="font-family:monospace;font-size:0.8rem;line-height:2;max-height:60vh;overflow-y:auto;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.5rem;"></div>
  <div style="display:flex;gap:1rem;align-items:center;">
    <button id="migrate-btn" onclick="runMigration()" class="btn-primary" style="padding:12px 32px;font-size:1rem;">Run Migration</button>
    <span id="migrate-summary" style="font-size:0.875rem;color:var(--muted);"></span>
  </div>
</main>

<script src="recipes.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script>
const STORAGE_BASE = 'https://qtvlctyyjjxmrpbchchl.supabase.co/storage/v1/object/public/recipe-images';

// Map local image paths to Supabase Storage URLs
function mapImageUrl(localPath) {
  if (!localPath) return null;
  const filename = localPath.split('/').pop();
  return `${STORAGE_BASE}/${filename}`;
}

function log(msg, type) {
  const el   = document.getElementById('migrate-status');
  const line = document.createElement('div');
  line.style.color = type === 'error' ? '#9B3A20' : type === 'success' ? '#2A5820' : type === 'warn' ? '#7A4E0A' : 'inherit';
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

async function runMigration() {
  const btn = document.getElementById('migrate-btn');
  btn.disabled    = true;
  btn.textContent = 'Running...';

  const isAdmin = await checkIsAdmin();
  if (!isAdmin) {
    log('ERROR: You must be signed in as admin to run migration.', 'error');
    btn.disabled    = false;
    btn.textContent = 'Run Migration';
    return;
  }

  log(`Starting migration of ${recipes.length} recipes...`, 'info');

  let success = 0, failed = 0, skipped = 0;

  for (const recipe of recipes) {
    try {
      // Check if recipe already exists
      const existing = await fetch(`${SUPABASE_URL}/rest/v1/recipes?id=eq.${recipe.id}&select=id`, { headers: authedHeaders() });
      const rows     = await existing.json();

      if (rows.length) {
        log(`⚠ Skipped #${recipe.id} "${recipe.title}" (already exists)`, 'warn');
        skipped++;
        continue;
      }

      const data = {
        title:        recipe.title,
        section:      recipe.section,
        basePortions: recipe.basePortions,
        cookTime:     recipe.cookTime,
        imageUrl:     mapImageUrl(recipe.image),
        calories:     recipe.macrosPerPortion.calories,
        protein:      recipe.macrosPerPortion.protein,
        carbs:        recipe.macrosPerPortion.carbs,
        fat:          recipe.macrosPerPortion.fat,
        fiber:        recipe.macrosPerPortion.fiber || null,
        ingredients:  recipe.ingredients,
        steps:        recipe.steps
      };

      // Insert recipe with specific ID
      const headers = authedHeaders();
      const recipePayload = { id: recipe.id, title: data.title, section: data.section, base_portions: data.basePortions, cook_time: data.cookTime, image_url: data.imageUrl };
      const recipeRes = await fetch(`${SUPABASE_URL}/rest/v1/recipes`, { method: 'POST', headers, body: JSON.stringify(recipePayload) });
      if (!recipeRes.ok) throw new Error(await recipeRes.text());

      // Macros
      const macroRes = await fetch(`${SUPABASE_URL}/rest/v1/recipe_macros`, { method: 'POST', headers, body: JSON.stringify({ recipe_id: recipe.id, calories: data.calories, protein: data.protein, carbs: data.carbs, fat: data.fat, fiber: data.fiber }) });
      if (!macroRes.ok) throw new Error('macros: ' + await macroRes.text());

      // Ingredients
      if (recipe.ingredients.length) {
        const ingPayload = recipe.ingredients.map((ing, i) => ({ recipe_id: recipe.id, name: ing.name, amount: ing.amount, unit: ing.unit, sort_order: i }));
        const ingRes = await fetch(`${SUPABASE_URL}/rest/v1/recipe_ingredients`, { method: 'POST', headers, body: JSON.stringify(ingPayload) });
        if (!ingRes.ok) throw new Error('ingredients: ' + await ingRes.text());
      }

      // Steps
      if (recipe.steps.length) {
        const stepPayload = recipe.steps.map((step, i) => ({ recipe_id: recipe.id, title: step.title, description: step.description, sort_order: i }));
        const stepRes = await fetch(`${SUPABASE_URL}/rest/v1/recipe_steps`, { method: 'POST', headers, body: JSON.stringify(stepPayload) });
        if (!stepRes.ok) throw new Error('steps: ' + await stepRes.text());
      }

      log(`✓ Migrated #${recipe.id} "${recipe.title}"`, 'success');
      success++;
    } catch(e) {
      log(`✗ Failed #${recipe.id} "${recipe.title}": ${e.message}`, 'error');
      failed++;
    }
  }

  const summary = `Done. ${success} migrated, ${skipped} skipped, ${failed} failed.`;
  log('', 'info');
  log(summary, failed > 0 ? 'error' : 'success');
  document.getElementById('migrate-summary').textContent = summary;
  btn.textContent = 'Done';
}

async function init() {
  await initAuth();
  const session = getSession();
  if (!session) {
    log('Sign in as admin using the button in the nav, then refresh.', 'warn');
    document.getElementById('migrate-btn').disabled = true;
    document.getElementById('migrate-summary').textContent = 'Sign in as admin to use this tool.';
    return;
  }
  const isAdmin = await checkIsAdmin();
  if (!isAdmin) {
    document.getElementById('migrate-btn').disabled = true;
    document.getElementById('migrate-summary').textContent = 'Signed in but not admin.';
    log('Your account does not have admin permissions.', 'error');
  } else {
    log(`Signed in as admin (${session.user.email}). ${recipes.length} recipes ready to migrate.`, 'success');
  }
}

init();
</script>
</body>
</html>
