<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FatScran — High Protein Meal Prep</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/fatscran/sw.js');</script>
  <link rel="icon" type="image/png" href="fatscran-icon.png">
  <link rel="apple-touch-icon" href="fatscran-icon.png">
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Fat<span class="logo-scran">Scran</span></a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Recipes</a></li>
      <li><a href="shopping.html">Shopping List</a></li>
      <li><a href="planner.html">Planner</a></li>
    </ul>
  </div>
</nav>

<main id="page-content"></main>

<script src="recipes.js"></script>
<script src="js/utils.js"></script>
<script>
const SUPABASE_URL = 'https://qtvlctyyjjxmrpbchchl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dmxjdHl5amp4bXJwYmNoY2hsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMTI0ODYsImV4cCI6MjA5NjY4ODQ4Nn0.CVmRoT3gWc6cLwvGO2m2yMdkdfTKbftyNRLc7EQCcSs';

const params = new URLSearchParams(window.location.search);
const id     = parseInt(params.get('id'));
const recipe = recipes.find(r => r.id === id);
const main   = document.getElementById('page-content');

let portions      = 1;
let selectedStars = 0;

function addToList() {
  const list     = getList();
  const existing = list.find(i => i.id === recipe.id);
  if (existing) { existing.portions = portions; } else { list.push({ id: recipe.id, portions }); }
  saveList(list);
  updateBtn();
}

function updateBtn() {
  const btn    = document.getElementById('add-btn');
  if (!btn) return;
  const inList = getList().find(i => i.id === recipe.id);
  btn.textContent       = inList ? 'Update shopping list' : 'Add to shopping list';
  btn.style.background  = inList ? '#964517' : '#B8561E';
}

function shareRecipe() {
  const url      = window.location.href;
  const shareBtn = document.getElementById('share-btn');
  if (navigator.share) {
    navigator.share({ title: recipe.title + ' — FatScran', url });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      const original = shareBtn.textContent;
      shareBtn.textContent    = 'Copied!';
      shareBtn.style.background   = 'var(--accent)';
      shareBtn.style.color        = '#FAF7F2';
      shareBtn.style.borderColor  = 'var(--accent)';
      setTimeout(() => {
        shareBtn.textContent   = original;
        shareBtn.style.background  = '';
        shareBtn.style.color       = '';
        shareBtn.style.borderColor = '';
      }, 2000);
    });
  }
}

async function fetchRatings() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/ratings?recipe_id=eq.${id}&select=stars,review,created_at&order=created_at.desc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    if (!res.ok) { console.error('fetch ratings error', res.status, await res.text()); return []; }
    return res.json();
  } catch(e) { console.error(e); return []; }
}

async function submitRating() {
  const review = document.getElementById('review-text').value.trim();
  if (!selectedStars) { alert('Please select a star rating.'); return; }
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Submitting...';
  btn.disabled    = true;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/ratings`, {
      method: 'POST',
      headers: {
        'apikey':        SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type':  'application/json',
        'Prefer':        'return=minimal'
      },
      body: JSON.stringify({ recipe_id: id, stars: selectedStars, review: review || null })
    });
    if (res.ok) {
      document.getElementById('review-form').innerHTML = '<p class="review-thanks">Thanks for your review!</p>';
      loadRatings();
    } else {
      const err = await res.text();
      console.error('submit error', res.status, err);
      btn.textContent = 'Submit review';
      btn.disabled    = false;
      alert('Something went wrong (' + res.status + '): ' + err);
    }
  } catch(e) {
    console.error(e);
    btn.textContent = 'Submit review';
    btn.disabled    = false;
    alert('Network error, try again.');
  }
}

function starsHtml(rating, count) {
  let s = '';
  for (let i = 1; i <= 5; i++) s += `<span class="star ${i <= Math.round(rating) ? 'star--filled' : 'star--empty'}">&#9733;</span>`;
  return `<div class="avg-rating-row">${s}<span class="avg-rating-label">${rating.toFixed(1)} (${count} review${count !== 1 ? 's' : ''})</span></div>`;
}

function reviewListHtml(ratings) {
  if (!ratings.length) return '<p class="reviews-empty">No reviews yet. Be the first!</p>';
  return ratings.map(r => `
    <div class="review-item">
      <div class="review-stars">
        ${[1,2,3,4,5].map(i => `<span class="star ${i <= r.stars ? 'star--filled' : 'star--empty'}">&#9733;</span>`).join('')}
      </div>
      ${r.review ? `<p class="review-text">${r.review}</p>` : ''}
      <p class="review-date">${new Date(r.created_at).toLocaleDateString('en-GB')}</p>
    </div>`).join('');
}

async function loadRatings() {
  const ratings = await fetchRatings();
  const avgEl   = document.getElementById('avg-rating');
  const listEl  = document.getElementById('review-list');
  if (!avgEl) return;
  if (!ratings.length) {
    avgEl.innerHTML = '<p class="reviews-empty">No reviews yet. Be the first!</p>';
  } else {
    const avg = ratings.reduce((s, r) => s + r.stars, 0) / ratings.length;
    avgEl.innerHTML = starsHtml(avg, ratings.length);
  }
  if (listEl) listEl.innerHTML = reviewListHtml(ratings);
}

function setStars(n) {
  selectedStars = n;
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById('star-' + i);
    if (el) el.className = 'star-picker-star ' + (i <= n ? 'star--filled' : 'star--empty');
  }
}

if (!recipe) {
  document.title = 'Not Found — FatScran';
  main.innerHTML = `
    <a href="index.html" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      All Recipes
    </a>
    <div class="not-found-state">
      <p class="not-found-state__title">Recipe not found</p>
      <p>The recipe you're looking for doesn't exist.</p>
    </div>`;
} else {
  document.title = recipe.title + ' — FatScran';

  function renderPage() {
    const ingredientRows = recipe.ingredients.map(ing => `
      <li>
        <span>${ing.name}</span>
        <span class="ing-qty">${ing.amount === null ? ing.unit : (Math.round(ing.amount * (portions / recipe.basePortions) * 100) / 100) + ' ' + ing.unit}</span>
      </li>`).join('');

    const methodSteps = recipe.steps.map((step, i) => `
      <li>
        <span class="step-num">${i + 1}</span>
        <span class="step-text"><strong>${step.title}:</strong> ${step.description}</span>
      </li>`).join('');

    main.innerHTML = `
      <a href="index.html" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        All Recipes
      </a>

      ${recipe.image ? `
        <div class="recipe-banner-wrap">
          <div class="recipe-banner-image"><img src="${recipe.image}" alt="${recipe.title}"></div>
          <div class="recipe-hero-card">
            <div class="recipe-hero-top"><span class="${badgeClass(recipe.section)}">${recipe.section}</span></div>
            <h1 class="recipe-title">${recipe.title}</h1>
            <div class="recipe-meta">
              <span class="recipe-meta-item">${clockIconSvg(16)} ${recipe.cookTime}</span>
              <span class="recipe-meta-item">${portionIconSvg(16)} ${portions} portion${portions !== 1 ? 's' : ''}</span>
            </div>
          </div>
        </div>` : `
        <div class="recipe-hero-top"><span class="${badgeClass(recipe.section)}">${recipe.section}</span></div>
        <h1 class="recipe-title">${recipe.title}</h1>
        <div class="recipe-meta">
          <span class="recipe-meta-item">${clockIconSvg(16)} ${recipe.cookTime}</span>
          <span class="recipe-meta-item">${portionIconSvg(16)} ${portions} portion${portions !== 1 ? 's' : ''}</span>
        </div>`}

      <div id="avg-rating"><span class="ratings-loading">Loading reviews...</span></div>

      <div class="portions-control">
        <label>Portions:</label>
        <button onclick="changePortion(-1)">&#8722;</button>
        <span id="portion-count">${portions}</span>
        <button onclick="changePortion(1)">+</button>
      </div>

      <div class="macros-strip">
        <div class="macro-item"><span class="macro-value">${Math.round(recipe.macrosPerPortion.calories * portions)}</span><span class="macro-label">Calories</span></div>
        <div class="macro-item"><span class="macro-value">${Math.round(recipe.macrosPerPortion.protein  * portions)}g</span><span class="macro-label">Protein</span></div>
        <div class="macro-item"><span class="macro-value">${Math.round(recipe.macrosPerPortion.carbs    * portions)}g</span><span class="macro-label">Carbs</span></div>
        <div class="macro-item"><span class="macro-value">${Math.round(recipe.macrosPerPortion.fat      * portions)}g</span><span class="macro-label">Fat</span></div>
      </div>

      <div class="recipe-actions">
        <button id="add-btn" onclick="addToList()" class="btn-primary">Add to shopping list</button>
        <button id="share-btn" onclick="shareRecipe()" class="btn-secondary">Share recipe</button>
      </div>

      <div class="recipe-body">
        <div class="ingredients-col">
          <p class="section-label">Ingredients</p>
          <ul class="ingredients-list">${ingredientRows}</ul>
        </div>
        <div class="method-col">
          <p class="section-label">Method</p>
          <ol class="method-list">${methodSteps}</ol>
        </div>
      </div>

      <div class="reviews-section">
        <p class="section-label">Reviews</p>
        <div id="review-list" class="review-list"></div>
        <div id="review-form" class="review-form">
          <p class="review-form-label">Leave a review</p>
          <div class="star-picker">
            ${[1,2,3,4,5].map(i => `<span id="star-${i}" class="star-picker-star star--empty" onclick="setStars(${i})">&#9733;</span>`).join('')}
          </div>
          <textarea id="review-text" placeholder="Write a review (optional)"></textarea>
          <button id="submit-btn" onclick="submitRating()">Submit review</button>
        </div>
      </div>`;

    updateBtn();
    loadRatings();
  }

  function changePortion(delta) {
    portions = Math.max(1, portions + delta);
    renderPage();
  }

  renderPage();
}
</script>
</body>
</html>
