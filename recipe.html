<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe — FatScran</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Fat<span class="logo-scran">Scran</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Recipes</a></li>
      <li><a href="shopping.html">Shopping List</a></li>
    </ul>
  </div>
</nav>

<main id="page-content"></main>

<script src="recipes.js"></script>
<script>
  const SUPABASE_URL = 'https://qtvlctyyjjxmrpbchchl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_-kV5lOEAFhi6-3ZZkDR_0A_crGAYgyO';

  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  const recipe = recipes.find(r => r.id === id);
  const main = document.getElementById('page-content');

  let portions = 1;
  let selectedStars = 0;

  function badgeClass(section) { return 'badge badge-' + section.toLowerCase(); }
  function clockIcon() { return `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`; }
  function portionIcon() { return `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`; }

  function getList() { try { return JSON.parse(localStorage.getItem('fatscran-list') || '[]'); } catch(e) { return []; } }
  function saveList(list) { localStorage.setItem('fatscran-list', JSON.stringify(list)); }

  function addToList() {
    const list = getList();
    const existing = list.find(i => i.id === recipe.id);
    if (existing) { existing.portions = portions; } else { list.push({ id: recipe.id, portions }); }
    saveList(list);
    updateBtn();
  }

  function updateBtn() {
    const btn = document.getElementById('add-btn');
    if (!btn) return;
    const inList = getList().find(i => i.id === recipe.id);
    btn.textContent = inList ? 'Update shopping list' : 'Add to shopping list';
    btn.style.background = inList ? '#0F6E56' : '#1D9E75';
  }

  async function fetchRatings() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/ratings?recipe_id=eq.${id}&select=stars,review,created_at`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    return res.ok ? res.json() : [];
  }

  async function submitRating() {
    const review = document.getElementById('review-text').value.trim();
    if (!selectedStars) { alert('Please select a star rating.'); return; }
    const btn = document.getElementById('submit-btn');
    btn.textContent = 'Submitting...';
    btn.disabled = true;
    const res = await fetch(`${SUPABASE_URL}/rest/v1/ratings`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ recipe_id: id, stars: selectedStars, review: review || null })
    });
    if (res.ok) {
      document.getElementById('review-form').innerHTML = '<p style="color:#1D9E75;font-weight:600;">Thanks for your review!</p>';
      loadRatings();
    } else {
      btn.textContent = 'Submit review';
      btn.disabled = false;
      alert('Something went wrong, try again.');
    }
  }

  function starsHtml(rating, count) {
    const full = Math.round(rating);
    let s = '';
    for (let i = 1; i <= 5; i++) {
      s += `<span style="color:${i <= full ? '#f59e0b' : '#ddd'};font-size:20px;">★</span>`;
    }
    return `<div style="display:flex;align-items:center;gap:6px;">${s}<span style="font-size:14px;color:var(--muted)">${rating.toFixed(1)} (${count} review${count !== 1 ? 's' : ''})</span></div>`;
  }

  function noRatingsHtml() {
    return `<p style="font-size:14px;color:var(--muted)">No reviews yet. Be the first!</p>`;
  }

  function reviewListHtml(ratings) {
    if (!ratings.length) return '';
    return ratings.map(r => `
      <div style="padding:12px 0;border-bottom:0.5px solid var(--color-border-tertiary);">
        <div style="display:flex;gap:4px;margin-bottom:4px;">
          ${[1,2,3,4,5].map(i => `<span style="color:${i <= r.stars ? '#f59e0b' : '#ddd'};font-size:16px;">★</span>`).join('')}
        </div>
        ${r.review ? `<p style="font-size:14px;color:var(--color-text-primary);margin:0;">${r.review}</p>` : ''}
        <p style="font-size:12px;color:var(--muted);margin:4px 0 0;">${new Date(r.created_at).toLocaleDateString('en-GB')}</p>
      </div>`).join('');
  }

  async function loadRatings() {
    const ratings = await fetchRatings();
    const avgEl = document.getElementById('avg-rating');
    const listEl = document.getElementById('review-list');
    if (!avgEl) return;
    if (!ratings.length) {
      avgEl.innerHTML = noRatingsHtml();
    } else {
      const avg = ratings.reduce((s, r) => s + r.stars, 0) / ratings.length;
      avgEl.innerHTML = starsHtml(avg, ratings.length);
    }
    if (listEl) listEl.innerHTML = reviewListHtml(ratings);
  }

  function setStars(n) {
    selectedStars = n;
    for (let i = 1; i <= 5; i++) {
      const el = document.getElementById('star-' + i);
      if (el) el.style.color = i <= n ? '#f59e0b' : '#ddd';
    }
  }

  if (!recipe) {
    document.title = 'Not Found — FatScran';
    main.innerHTML = `
      <a href="index.html" class="back-link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>All Recipes</a>
      <div style="text-align:center;padding:5rem 1rem;color:var(--muted)">
        <p style="font-size:1.25rem;font-weight:700;margin-bottom:0.5rem">Recipe not found</p>
        <p>The recipe you're looking for doesn't exist.</p>
      </div>`;
  } else {
    document.title = recipe.title + ' — FatScran';
    portions = 1;

    function renderPage() {
      const ingredientRows = recipe.ingredients.map(ing => `
        <li>
          <span>${ing.name}</span>
          <span class="ing-qty">${ing.amount === null ? ing.unit : (Math.round(ing.amount * (portions / recipe.basePortions) * 100) / 100) + ' ' + ing.unit}</span>
        </li>`).join('');

      const methodSteps = recipe.steps.map((step, i) => `
        <li>
          <span class="step-num">${i + 1}</span>
          <span class="step-text"><strong>${step.title}:</strong> ${step.description}</span>
        </li>`).join('');

      main.innerHTML = `
        <a href="index.html" class="back-link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>All Recipes</a>
        <div class="recipe-hero-top"><span class="${badgeClass(recipe.section)}">${recipe.section}</span></div>
        <h1 class="recipe-title">${recipe.title}</h1>
        <div class="recipe-meta">
          <span>${clockIcon()} ${recipe.cookTime}</span>
          <span>${portionIcon()} ${portions} portion${portions !== 1 ? 's' : ''}</span>
        </div>
        <div id="avg-rating" style="margin:0.5rem 0;"><span style="font-size:14px;color:var(--muted)">Loading reviews...</span></div>
        <div class="portions-control" style="margin:1rem 0;display:flex;align-items:center;gap:12px;">
          <label style="font-size:14px;color:var(--muted)">Portions:</label>
          <button onclick="changePortion(-1)" style="width:32px;height:32px;border-radius:50%;border:1px solid #ccc;background:none;font-size:18px;cursor:pointer;">-</button>
          <span id="portion-count" style="font-size:16px;font-weight:600;min-width:24px;text-align:center;">${portions}</span>
          <button onclick="changePortion(1)" style="width:32px;height:32px;border-radius:50%;border:1px solid #ccc;background:none;font-size:18px;cursor:pointer;">+</button>
        </div>
        <div class="macros-strip">
          <div class="macro-item"><span class="macro-value">${Math.round(recipe.macrosPerPortion.calories * portions)}</span><span class="macro-label">Calories</span></div>
          <div class="macro-item"><span class="macro-value">${Math.round(recipe.macrosPerPortion.protein * portions)}g</span><span class="macro-label">Protein</span></div>
          <div class="macro-item"><span class="macro-value">${Math.round(recipe.macrosPerPortion.carbs * portions)}g</span><span class="macro-label">Carbs</span></div>
          <div class="macro-item"><span class="macro-value">${Math.round(recipe.macrosPerPortion.fat * portions)}g</span><span class="macro-label">Fat</span></div>
        </div>
        <button id="add-btn" onclick="addToList()" style="margin:1rem 0;padding:10px 24px;background:#1D9E75;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;">Add to shopping list</button>
        <div class="recipe-body">
          <div class="ingredients-col">
            <p class="section-label">Ingredients</p>
            <ul class="ingredients-list">${ingredientRows}</ul>
          </div>
          <div class="method-col">
            <p class="section-label">Method</p>
            <ol class="method-list">${methodSteps}</ol>
          </div>
        </div>

        <div style="margin-top:2rem;max-width:600px;">
          <p class="section-label">Reviews</p>
          <div id="review-list" style="margin-bottom:1.5rem;"></div>

          <div id="review-form">
            <p style="font-size:14px;font-weight:600;margin-bottom:8px;">Leave a review</p>
            <div style="display:flex;gap:4px;margin-bottom:12px;">
              ${[1,2,3,4,5].map(i => `<span id="star-${i}" onclick="setStars(${i})" style="font-size:28px;color:#ddd;cursor:pointer;transition:color 0.1s;">★</span>`).join('')}
            </div>
            <textarea id="review-text" placeholder="Write a review (optional)" style="width:100%;padding:10px;border:1px solid var(--color-border-secondary);border-radius:8px;font-size:14px;resize:vertical;min-height:80px;font-family:inherit;background:var(--color-background-primary);color:var(--color-text-primary);"></textarea>
            <button id="submit-btn" onclick="submitRating()" style="margin-top:8px;padding:10px 24px;background:#1D9E75;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;">Submit review</button>
          </div>
        </div>`;

      updateBtn();
      loadRatings();
    }

    function changePortion(delta) {
      portions = Math.max(1, portions + delta);
      renderPage();
    }

    renderPage();
  }
</script>
</body>
</html>
