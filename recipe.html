<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FatScran — High Protein Meal Prep</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/fatscran/sw.js');</script>
  <script src="https://js-de.sentry-cdn.com/7e75aa5aac90f9f87fe2ea2f59c6b137.min.js" integrity="sha256-uJqZ9zwsj6gMvcoGxgfxs6q1L3kHWCLNxJGRCckAZ6E=" crossorigin="anonymous"></script>
  <link rel="icon" type="image/png" href="fatscran-icon.png">
  <link rel="apple-touch-icon" href="fatscran-icon.png">
</head>
<body>
<nav id="main-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Fat<span class="logo-scran">Scran</span></a>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu" aria-expanded="false">☰</button>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html" class="active">Recipes</a></li>
      <li><a href="shopping.html">Shopping List</a></li>
      <li><a href="planner.html">Planner</a></li>
    </ul>
  </div>
</nav>

<main id="page-content"><div class="no-results" style="font-style:normal;padding:4rem 1rem;">Loading...</div></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="recipes.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script>

const urlParams = new URLSearchParams(window.location.search);
const recipeId  = parseInt(urlParams.get('id'));
const mainEl    = document.getElementById('page-content');

let recipe        = null;
let portions      = 1;
let selectedStars = 0;
let isAdmin       = false;

async function addToList() {
  await addToListSync(recipe.id, portions);
  await updateBtn();
}

async function updateBtn() {
  const btn    = document.getElementById('add-btn');
  if (!btn) return;
  const list   = await getListSync();
  const inList = list.find(i => i.id === recipe.id);
  const label  = btn.querySelector('.btn-label');
  if (label) label.textContent = inList ? 'Update list' : 'Add to list';
  btn.style.background = inList ? 'var(--accent-dark)' : 'var(--accent)';
}

function shareRecipe() {
  const url      = window.location.href;
  const shareBtn = document.getElementById('share-btn');
  if (navigator.share) {
    navigator.share({ title: recipe.title + ' — FatScran', url });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      const label = shareBtn.querySelector('.btn-label');
      const original = label ? label.textContent : shareBtn.textContent;
      if (label) label.textContent = 'Copied!'; else shareBtn.textContent = 'Copied!';
      shareBtn.style.background  = 'var(--accent)';
      shareBtn.style.color       = '#FAF7F2';
      shareBtn.style.borderColor = 'var(--accent)';
      setTimeout(() => {
        if (label) label.textContent = original; else shareBtn.textContent = original;
        shareBtn.style.background = ''; shareBtn.style.color = ''; shareBtn.style.borderColor = '';
      }, 2000);
    });
  }
}

async function fetchRatings() {
  try {
    const { data, error } = await _supabase
      .from('ratings')
      .select('id,stars,review,created_at,user_id')
      .eq('recipe_id', recipeId)
      .order('created_at', { ascending: false });
    if (error) return [];
    return data;
  } catch(e) { return []; }
}

async function submitRating() {
  const review = document.getElementById('review-text').value.trim();
  if (!selectedStars) { alert('Please select a star rating.'); return; }
  const session = getSession();
  const userId  = session ? session.user.id : null;
  if (!userId) return;
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Submitting...';
  btn.disabled    = true;
  try {
    const { data: existing } = await _supabase
      .from('ratings')
      .select('id')
      .eq('recipe_id', recipeId)
      .eq('user_id', userId)
      .maybeSingle();

    if (existing) {
      const { error } = await _supabase
        .from('ratings')
        .update({ stars: selectedStars, review: review || null })
        .eq('id', existing.id);
      if (error) throw error;
    } else {
      const { error } = await _supabase
        .from('ratings')
        .insert({ recipe_id: recipeId, stars: selectedStars, review: review || null, user_id: userId });
      if (error) throw error;
    }

    document.getElementById('review-form').innerHTML = '<p class="review-thanks">Thanks for your review!</p>';
    loadRatings();
  } catch(e) { btn.textContent = 'Submit review'; btn.disabled = false; alert('Something went wrong, try again.'); }
}

async function loadRatings() {
  const ratings = await fetchRatings();
  const avgEl   = document.getElementById('avg-rating');
  const listEl  = document.getElementById('review-list');
  if (!avgEl) return;

  // Batch-fetch display names for all user_ids in one query
  const userIds = [...new Set(ratings.filter(r => r.user_id).map(r => r.user_id))];
  const nameMap = {};
  if (userIds.length) {
    const { data: profiles } = await _supabase
      .from('profiles')
      .select('id,display_name')
      .in('id', userIds);
    if (profiles) profiles.forEach(p => {
      nameMap[p.id] = p.display_name ? p.display_name.trim().split(' ')[0] : 'Anonymous';
    });
  }

  if (!ratings.length) {
    avgEl.innerHTML = '<p class="reviews-empty">No reviews yet. Be the first!</p>';
  } else {
    const avg = ratings.reduce((s, r) => s + r.stars, 0) / ratings.length;
    let s = '';
    for (let i = 1; i <= 5; i++) s += `<span class="star ${i <= Math.round(avg) ? 'star--filled' : 'star--empty'}">&#9733;</span>`;
    avgEl.innerHTML = `<div class="avg-rating-row">${s}<span class="avg-rating-label">${avg.toFixed(1)} (${ratings.length} review${ratings.length !== 1 ? 's' : ''})</span></div>`;
  }
  if (listEl) listEl.innerHTML = ratings.map(r => {
    const name = r.user_id ? (nameMap[r.user_id] || 'Anonymous') : 'Anonymous';
    return `
    <div class="review-item">
      <div class="review-stars">${[1,2,3,4,5].map(i => `<span class="star ${i <= r.stars ? 'star--filled' : 'star--empty'}">&#9733;</span>`).join('')}</div>
      <p class="review-name">${escapeHtml(name)}</p>
      ${r.review ? `<p class="review-text">${escapeHtml(r.review)}</p>` : ''}
      <p class="review-date">${new Date(r.created_at).toLocaleDateString('en-GB')}</p>
    </div>`;
  }).join('') || '<p class="reviews-empty">No reviews yet. Be the first!</p>';
}

function setStars(n) {
  selectedStars = n;
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById('star-' + i);
    if (el) el.className = 'star-picker-star ' + (i <= n ? 'star--filled' : 'star--empty');
  }
}

function renderPage() {
  document.title = recipe.title + ' — FatScran';

  const ingredientRows = recipe.ingredients.map(ing => `<li><span>${escapeHtml(ing.name)}</span><span class="ing-qty">${ing.amount === null ? escapeHtml(ing.unit) : (Math.round(ing.amount * (portions / recipe.basePortions) * 100) / 100) + ' ' + escapeHtml(ing.unit)}</span></li>`).join('');
  const methodSteps    = recipe.steps.map((step, i) => `<li><span class="step-num">${i + 1}</span><span class="step-text"><strong>${escapeHtml(step.title)}:</strong> ${escapeHtml(step.description)}</span></li>`).join('');
  const adminEditBtn   = isAdmin ? `<a href="admin.html?edit=${recipe.id}" class="btn-secondary" style="text-decoration:none;">&#9998; Edit recipe</a>` : '';

  mainEl.innerHTML = `
    <a href="index.html" class="back-link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>All Recipes</a>

    ${recipe.image ? `
      <div class="recipe-banner-wrap">
        <div class="recipe-banner-image"><img src="${escapeHtml(supabaseImgUrl(recipe.image, 800, 85))}" alt="${escapeHtml(recipe.title)}" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
        <div class="recipe-hero-card">
          <div class="recipe-hero-top"><span class="${badgeClass(recipe.section)}">${escapeHtml(recipe.section)}</span></div>
          <h1 class="recipe-title">${escapeHtml(recipe.title)}</h1>
          <div class="recipe-meta">
            <span class="recipe-meta-item">${clockIconSvg(16)} ${escapeHtml(recipe.cookTime)}</span>
            <span class="recipe-meta-item">${portionIconSvg(16)} <span id="portion-meta">${portions} portion${portions !== 1 ? 's' : ''}</span></span>
          </div>
        </div>
      </div>` : `
      <div class="recipe-hero-top"><span class="${badgeClass(recipe.section)}">${escapeHtml(recipe.section)}</span></div>
      <h1 class="recipe-title">${escapeHtml(recipe.title)}</h1>
      <div class="recipe-meta">
        <span class="recipe-meta-item">${clockIconSvg(16)} ${escapeHtml(recipe.cookTime)}</span>
        <span class="recipe-meta-item">${portionIconSvg(16)} <span id="portion-meta">${portions} portion${portions !== 1 ? 's' : ''}</span></span>
      </div>`}

    <div id="avg-rating"><span class="ratings-loading">Loading reviews...</span></div>

    <div class="portions-control">
      <label>Portions:</label>
      <button onclick="changePortion(-1)">&#8722;</button>
      <span id="portion-count">${portions}</span>
      <button onclick="changePortion(1)">+</button>
    </div>

    <div class="macros-strip">
      <div class="macro-item"><span class="macro-value" data-macro="calories">${Math.round(recipe.macrosPerPortion.calories * portions)}</span><span class="macro-label">Calories</span></div>
      <div class="macro-item"><span class="macro-value" data-macro="protein">${Math.round(recipe.macrosPerPortion.protein  * portions)}g</span><span class="macro-label">Protein</span></div>
      <div class="macro-item"><span class="macro-value" data-macro="carbs">${Math.round(recipe.macrosPerPortion.carbs    * portions)}g</span><span class="macro-label">Carbs</span></div>
      <div class="macro-item"><span class="macro-value" data-macro="fat">${Math.round(recipe.macrosPerPortion.fat      * portions)}g</span><span class="macro-label">Fat</span></div>
      ${recipe.macrosPerPortion.sugar != null ? `<div class="macro-item"><span class="macro-value" data-macro="sugar">${Math.round(recipe.macrosPerPortion.sugar * portions)}g</span><span class="macro-label">Sugar</span></div>` : ''}
      ${recipe.macrosPerPortion.fiber != null ? `<div class="macro-item"><span class="macro-value" data-macro="fiber">${Math.round(recipe.macrosPerPortion.fiber * portions)}g</span><span class="macro-label">Fiber</span></div>` : ''}
    </div>

    <div class="recipe-actions">
      <button id="add-btn" onclick="addToList()" class="btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="btn-label">Add to list</span>
      </button>
      <button id="share-btn" onclick="shareRecipe()" class="btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        <span class="btn-label">Share</span>
      </button>
      ${adminEditBtn}
    </div>

    <div class="recipe-body">
      <div class="ingredients-col"><p class="section-label">Ingredients</p><ul class="ingredients-list">${ingredientRows}</ul></div>
      <div class="method-col"><p class="section-label">Method</p><ol class="method-list">${methodSteps}</ol></div>
    </div>

    <div class="reviews-section">
      <p class="section-label">Reviews</p>
      <div id="review-list" class="review-list"></div>
      <div id="review-form" class="review-form">
        ${getSession() ? `
          <p class="review-form-label">Leave a review</p>
          <div class="star-picker">${[1,2,3,4,5].map(i => `<span id="star-${i}" class="star-picker-star star--empty" onclick="setStars(${i})">&#9733;</span>`).join('')}</div>
          <textarea id="review-text" placeholder="Write a review (optional)" maxlength="1000"></textarea>
          <button id="submit-btn" onclick="submitRating()">Submit review</button>
        ` : `<p class="reviews-empty"><a href="#" onclick="openAuthModal();return false;">Sign in</a> to leave a review.</p>`}
      </div>
    </div>`;

  updateBtn();
  loadRatings();
}

function changePortion(delta) {
  portions = Math.max(1, portions + delta);

  const countEl = document.getElementById('portion-count');
  if (countEl) countEl.textContent = portions;

  const metaEl = document.getElementById('portion-meta');
  if (metaEl) metaEl.textContent = `${portions} portion${portions !== 1 ? 's' : ''}`;

  const m = recipe.macrosPerPortion;
  [['calories', Math.round(m.calories * portions)],
   ['protein',  Math.round(m.protein  * portions) + 'g'],
   ['carbs',    Math.round(m.carbs    * portions) + 'g'],
   ['fat',      Math.round(m.fat      * portions) + 'g'],
   ...(m.sugar != null ? [['sugar', Math.round(m.sugar * portions) + 'g']] : []),
   ...(m.fiber != null ? [['fiber', Math.round(m.fiber * portions) + 'g']] : []),
  ].forEach(([key, val]) => {
    const el = document.querySelector(`.macro-value[data-macro="${key}"]`);
    if (el) el.textContent = val;
  });

  const ingQtyEls = document.querySelectorAll('.ing-qty');
  recipe.ingredients.forEach((ing, i) => {
    if (!ingQtyEls[i]) return;
    ingQtyEls[i].textContent = ing.amount === null
      ? ing.unit
      : (Math.round(ing.amount * (portions / recipe.basePortions) * 100) / 100) + ' ' + ing.unit;
  });
}

async function init() {
  if (!recipeId || isNaN(recipeId)) {
    document.title = 'Not Found — FatScran';
    mainEl.innerHTML = `<a href="index.html" class="back-link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>All Recipes</a><div class="not-found-state"><p class="not-found-state__title">Recipe not found</p><p>The recipe you're looking for doesn't exist.</p></div>`;
    return;
  }
  await initAuth();
  [recipe, isAdmin] = await Promise.all([fetchRecipeByIdDirect(recipeId), checkIsAdmin()]);

  if (!recipe) {
    document.title = 'Not Found — FatScran';
    mainEl.innerHTML = `<a href="index.html" class="back-link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>All Recipes</a><div class="not-found-state"><p class="not-found-state__title">Recipe not found</p><p>The recipe you're looking for doesn't exist.</p></div>`;
    return;
  }

  renderPage();
}

init();
</script>
</body>
</html>
