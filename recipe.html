<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe — FatScran</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Fat<span class="logo-scran">Scran</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Recipes</a></li>
      <li><a href="shopping.html">Shopping List</a></li>
    </ul>
  </div>
</nav>

<main id="page-content">
  <!-- populated by JS -->
</main>

<script src="recipes.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const recipe = recipes.find(r => r.id === id);
  const main = document.getElementById('page-content');

  function badgeClass(section) {
    return 'badge badge-' + section.toLowerCase();
  }

  function clockIcon() {
    return `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  }

  function portionIcon() {
    return `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;
  }

  if (!recipe) {
    document.title = 'Not Found — FatScran';
    main.innerHTML = `
      <a href="index.html" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        All Recipes
      </a>
      <div style="text-align:center;padding:5rem 1rem;color:var(--muted)">
        <p style="font-size:1.25rem;font-weight:700;margin-bottom:0.5rem">Recipe not found</p>
        <p>The recipe you're looking for doesn't exist.</p>
      </div>`;
  } else {
    document.title = recipe.name + ' — FatScran';

    const ingredientRows = recipe.ingredients.map(ing => `
      <li>
        <span>${ing.name}</span>
        <span class="ing-qty">${ing.quantity}</span>
      </li>`).join('');

    const methodSteps = recipe.method.map((step, i) => `
      <li>
        <span class="step-num">${i + 1}</span>
        <span class="step-text">${step}</span>
      </li>`).join('');

    main.innerHTML = `
      <a href="index.html" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        All Recipes
      </a>

      <div class="recipe-hero-top">
        <span class="${badgeClass(recipe.section)}">${recipe.section}</span>
      </div>
      <h1 class="recipe-title">${recipe.name}</h1>

      <div class="recipe-meta">
        <span>${clockIcon()} ${recipe.cookTime} minutes</span>
        <span>${portionIcon()} ${recipe.portions} portion${recipe.portions !== 1 ? 's' : ''}</span>
      </div>

      <div class="macros-strip">
        <div class="macro-item">
          <span class="macro-value">${recipe.calories}</span>
          <span class="macro-label">Calories</span>
        </div>
        <div class="macro-item">
          <span class="macro-value">${recipe.protein}g</span>
          <span class="macro-label">Protein</span>
        </div>
        <div class="macro-item">
          <span class="macro-value">${recipe.carbs}g</span>
          <span class="macro-label">Carbs</span>
        </div>
        <div class="macro-item">
          <span class="macro-value">${recipe.fat}g</span>
          <span class="macro-label">Fat</span>
        </div>
      </div>

      <div class="recipe-body">
        <div class="ingredients-col">
          <p class="section-label">Ingredients</p>
          <ul class="ingredients-list">${ingredientRows}</ul>
        </div>
        <div class="method-col">
          <p class="section-label">Method</p>
          <ol class="method-list">${methodSteps}</ol>
        </div>
      </div>
    `;
  }
</script>
</body>
</html>
