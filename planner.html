<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Planner — FatScran</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
  <script src="https://js-de.sentry-cdn.com/7e75aa5aac90f9f87fe2ea2f59c6b137.min.js" integrity="sha256-uJqZ9zwsj6gMvcoGxgfxs6q1L3kHWCLNxJGRCckAZ6E=" crossorigin="anonymous"></script>
  <link rel="icon" type="image/png" href="fatscran-icon.png">
  <link rel="apple-touch-icon" href="fatscran-icon.png">
</head>
<body>
<nav id="main-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Fat<span class="logo-scran">Scran</span></a>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu" aria-expanded="false">☰</button>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Recipes</a></li>
      <li><a href="shopping.html">Shopping List</a></li>
      <li><a href="planner.html" class="active">Planner</a></li>
    </ul>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Meal Planner</h1>
    <p>Tap any slot to assign a recipe.</p>
  </div>
  <div class="week-nav">
    <button id="prev-btn" onclick="changeWeek(-1)" class="week-nav__btn">&#8592; Prev</button>
    <div class="week-nav__label"><h2 id="week-label"></h2></div>
    <div class="week-nav__right">
      <button class="week-nav__btn week-nav__btn--today" onclick="goToToday()">Today</button>
      <button id="next-btn" onclick="changeWeek(1)" class="week-nav__btn">Next &#8594;</button>
    </div>
  </div>
  <div class="planner-actions">
    <button class="btn-sm btn-primary" onclick="addWeekToShoppingList()">Add week to shopping list</button>
  </div>
  <div class="week-grid" id="week-grid"></div>
  <div class="batch-summary" id="batch-summary"></div>
  <div id="weekly-overview"></div>
</main>

<!-- Recipe picker modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title">Pick a recipe</h3>
      <button class="modal-close" onclick="closeModalDirect()">&#215;</button>
    </div>
    <div class="modal-search">
      <input type="text" placeholder="Search recipes..." oninput="filterModal(this.value)" id="modal-search-input">
    </div>
    <div class="modal-filter-row">
      <button class="modal-filter-btn" data-section="breakfast" onclick="setModalFilter('breakfast')">Breakfast</button>
      <button class="modal-filter-btn" data-section="dinner" onclick="setModalFilter('dinner')">Dinner</button>
      <button class="modal-filter-btn" data-section="tea" onclick="setModalFilter('tea')">Tea</button>
      <button class="modal-filter-btn" data-section="all" onclick="setModalFilter('all')">All</button>
    </div>
    <div class="modal-list" id="modal-list"></div>
  </div>
</div>

<!-- Copy modal -->
<div id="copy-modal-overlay" class="modal-overlay" style="display:none;" onclick="closeCopyModal(event)">
  <div class="modal copy-modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="copy-modal-title">Copy to days</h3>
      <button class="modal-close" onclick="closeCopyModalDirect()">&#215;</button>
    </div>
    <div id="copy-modal-body" class="copy-modal-body"></div>
    <div class="copy-modal-footer">
      <button class="btn-secondary" onclick="closeCopyModalDirect()">Cancel</button>
      <button class="btn-primary" onclick="confirmCopy()">Copy</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="recipes.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script>
const DAYS  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MEALS = ['breakfast','dinner','tea'];
const MAX_WEEKS = 4;

let currentWeekOffset  = 0;
let modalDay           = null;
let modalMeal          = null;
let modalSectionFilter = 'all';
let currentPlan        = {};
let userProfile        = null;
let allRecipes         = [];

let copyMode         = null;
let copySlotDay      = null;
let copySlotMeal     = null;
let copySlotRecipeId = null;
let copyFromDay      = null;

const COPY_SVG = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;

function getMonday(offset) {
  const now    = new Date();
  const day    = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  monday.setHours(0, 0, 0, 0);
  return monday;
}

function weekKey(offset) {
  const m = getMonday(offset);
  return `week-${m.getFullYear()}-${m.getMonth()}-${m.getDate()}`;
}

function formatDate(date) {
  return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function getTodayDayIndex() {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}

function updateNav() {
  const monday = getMonday(currentWeekOffset);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  document.getElementById('week-label').textContent = `${formatDate(monday)} – ${formatDate(sunday)}`;
  document.getElementById('prev-btn').disabled = currentWeekOffset <= -MAX_WEEKS;
  document.getElementById('next-btn').disabled = currentWeekOffset >= MAX_WEEKS;
}

function dayTotalsClass(calories) {
  if (!userProfile?.target_calories || !calories) return '';
  return 'day-totals--' + macroBarClass(calories, userProfile.target_calories);
}

function renderWeek() {
  updateNav();
  const plan     = currentPlan;
  const monday   = getMonday(currentWeekOffset);
  const todayIdx = currentWeekOffset === 0 ? getTodayDayIndex() : -1;
  const grid     = document.getElementById('week-grid');

  grid.innerHTML = DAYS.map((day, di) => {
    const date = new Date(monday);
    date.setDate(monday.getDate() + di);
    let dayCalories = 0, dayProtein = 0;
    let filledSlots = 0;

    const slots = MEALS.map(meal => {
      const key      = `${day}-${meal}`;
      const recipeId = plan[key];
      const recipe   = recipeId ? allRecipes.find(r => r.id === recipeId) : null;
      if (recipe) { dayCalories += recipe.macrosPerPortion.calories; dayProtein += recipe.macrosPerPortion.protein; filledSlots++; }
      return `
        <div class="meal-slot" onclick="openModal('${day}','${meal}')">
          <div class="meal-slot-label">${meal.charAt(0).toUpperCase() + meal.slice(1)}</div>
          ${recipe ? `
            <div class="slot-recipe" onclick="event.stopPropagation()">
              <div class="slot-btns">
                <button class="remove-slot" onclick="removeFromSlot('${day}','${meal}')" title="Remove">&#215;</button>
                <button class="copy-slot-btn" onclick="openCopySlotModal('${day}','${meal}',${recipeId})" title="Copy to other days">${COPY_SVG}</button>
              </div>
              ${escapeHtml(recipe.title)}
              <div class="slot-macros">${recipe.macrosPerPortion.calories} kcal &middot; ${recipe.macrosPerPortion.protein}g</div>
            </div>` : ''}
        </div>`;
    }).join('');

    const tlClass  = dayTotalsClass(dayCalories);
    const progPct  = Math.min(filledSlots / MEALS.length * 100, 100);

    return `
      <div class="day-col">
        <div class="day-header ${di === todayIdx ? 'day-header--today' : ''}">
          <span class="day-header-label">${day}</span>
          ${filledSlots > 0 ? `<button class="copy-day-btn" onclick="event.stopPropagation();openCopyDayModal('${day}')" title="Copy day to other days">${COPY_SVG}</button>` : ''}
        </div>
        <div class="day-date">${formatDate(date)}</div>
        ${slots}
        ${dayCalories > 0 ? `
          <div class="day-totals ${tlClass}">
            <div><div class="day-total-val">${dayCalories}</div><div class="day-total-lbl">kcal</div></div>
            <div><div class="day-total-val">${dayProtein}g</div><div class="day-total-lbl">protein</div></div>
          </div>
          <div class="day-progress-bar"><div class="day-progress-fill" style="width:${progPct}%"></div></div>` : ''}
      </div>`;
  }).join('');

  renderBatchSummary(plan);
  renderWeeklyOverview(plan);
}

function renderWeeklyOverview(plan) {
  const el = document.getElementById('weekly-overview');
  if (!el) return;
  if (!userProfile?.target_calories) { el.innerHTML = ''; return; }

  let totalCal = 0, totalProt = 0, totalCarbs = 0, totalFat = 0;
  for (const [, id] of Object.entries(plan)) {
    if (!id) continue;
    const r = allRecipes.find(r => r.id === id);
    if (!r) continue;
    totalCal   += r.macrosPerPortion.calories;
    totalProt  += r.macrosPerPortion.protein;
    totalCarbs += r.macrosPerPortion.carbs;
    totalFat   += r.macrosPerPortion.fat;
  }
  if (!totalCal) { el.innerHTML = ''; return; }

  const tc  = userProfile.target_calories * 7;
  const tp  = (userProfile.target_protein || 0) * 7;
  const tch = (userProfile.target_carbs   || 0) * 7;
  const tf  = (userProfile.target_fat     || 0) * 7;

  const tlClass = (actual, target) => target ? 'tl-' + macroBarClass(actual, target) : '';

  el.innerHTML = `
    <div class="weekly-overview">
      <p class="section-label">Weekly macro overview</p>
      <div class="weekly-totals__grid">
        <div class="weekly-total-item">
          <div class="weekly-total-value ${tlClass(totalCal,tc)}">${Math.round(totalCal).toLocaleString()}</div>
          <div class="weekly-total-label">kcal${tc ? ' / '+tc.toLocaleString() : ''}</div>
        </div>
        ${tp ? `<div class="weekly-total-item">
          <div class="weekly-total-value ${tlClass(totalProt,tp)}">${Math.round(totalProt)}g</div>
          <div class="weekly-total-label">protein / ${tp}g</div>
        </div>` : ''}
        ${tch ? `<div class="weekly-total-item">
          <div class="weekly-total-value ${tlClass(totalCarbs,tch)}">${Math.round(totalCarbs)}g</div>
          <div class="weekly-total-label">carbs / ${tch}g</div>
        </div>` : ''}
        ${tf ? `<div class="weekly-total-item">
          <div class="weekly-total-value ${tlClass(totalFat,tf)}">${Math.round(totalFat)}g</div>
          <div class="weekly-total-label">fat / ${tf}g</div>
        </div>` : ''}
      </div>
    </div>`;
}

function renderBatchSummary(plan) {
  const recipeDays = {};
  for (const [key, recipeId] of Object.entries(plan)) {
    if (!recipeId) continue;
    const [day] = key.split('-');
    if (!recipeDays[recipeId]) recipeDays[recipeId] = [];
    if (!recipeDays[recipeId].includes(day)) recipeDays[recipeId].push(day);
  }
  const el  = document.getElementById('batch-summary');
  const ids = Object.keys(recipeDays);
  if (!ids.length) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <p class="section-label">What to batch cook this week</p>
    <div class="batch-grid">
      ${ids.map(id => {
        const recipe = allRecipes.find(r => r.id === parseInt(id));
        if (!recipe) return '';
        const days = recipeDays[id];
        return `<div class="batch-card"><div class="batch-card-title">${escapeHtml(recipe.title)}</div><div class="batch-card-meta">Needed: ${days.join(', ')}</div><div class="batch-card-meta">${escapeHtml(recipe.cookTime)} &middot; ${days.length} day${days.length !== 1 ? 's' : ''}</div></div>`;
      }).join('')}
    </div>`;
}

function showPlannerError(msg) {
  let el = document.getElementById('planner-write-error');
  if (!el) {
    el = document.createElement('p');
    el.id = 'planner-write-error';
    el.className = 'auth-error';
    el.style.cssText = 'margin: 0.5rem 0; max-width: 600px;';
    document.querySelector('main').insertBefore(el, document.getElementById('week-grid'));
  }
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

async function removeFromSlot(day, meal) {
  const key = `${day}-${meal}`;
  delete currentPlan[key];
  try {
    await savePlanSlot(weekKey(currentWeekOffset), key, null);
  } catch(e) {
    showPlannerError('Could not remove slot: ' + e.message);
  }
  renderWeek();
}

async function changeWeek(dir) {
  const next = currentWeekOffset + dir;
  if (next < -MAX_WEEKS || next > MAX_WEEKS) return;
  currentWeekOffset = next;
  currentPlan = await getPlanSync(weekKey(currentWeekOffset));
  renderWeek();
}

async function goToToday() {
  currentWeekOffset = 0;
  currentPlan = await getPlanSync(weekKey(0));
  renderWeek();
}

async function addWeekToShoppingList() {
  const counts = {};
  for (const id of Object.values(currentPlan).filter(Boolean).map(id => parseInt(id))) {
    counts[id] = (counts[id] || 0) + 1;
  }
  const list = await getListSync();
  for (const [idStr, count] of Object.entries(counts)) {
    const id = parseInt(idStr);
    const existing = list.find(i => i.id === id);
    if (existing) { existing.portions += count; } else { list.push({ id, portions: count }); }
  }
  await saveListSync(list);
  window.location.href = 'shopping.html';
}

// ---------------------------------------------------------------------------
// Suggestion helpers (use cached userProfile — never calls getProfile())
// ---------------------------------------------------------------------------

function getRemainingMacros(day) {
  let planned = { calories: 0, protein: 0, carbs: 0, fat: 0 };
  for (const meal of MEALS) {
    const id = currentPlan[`${day}-${meal}`];
    if (!id) continue;
    const r = allRecipes.find(r => r.id === id);
    if (!r) continue;
    planned.calories += r.macrosPerPortion.calories;
    planned.protein  += r.macrosPerPortion.protein;
    planned.carbs    += r.macrosPerPortion.carbs;
    planned.fat      += r.macrosPerPortion.fat;
  }
  return {
    calories: Math.max(0, (userProfile?.target_calories || 0) - planned.calories),
    protein:  Math.max(0, (userProfile?.target_protein  || 0) - planned.protein),
    carbs:    Math.max(0, (userProfile?.target_carbs    || 0) - planned.carbs),
    fat:      Math.max(0, (userProfile?.target_fat      || 0) - planned.fat)
  };
}

function getSuggestions(day, meal) {
  if (!userProfile?.target_calories && !userProfile?.target_protein) return [];
  const remaining = getRemainingMacros(day);
  return allRecipes
    .filter(r => r.section === meal)
    .map(r => {
      // Score by closeness to remaining macros; protein gap weighted 3× over calories
      const proteinDiff  = Math.abs(r.macrosPerPortion.protein  - remaining.protein)  / Math.max(remaining.protein,  1);
      const calorieDiff  = Math.abs(r.macrosPerPortion.calories - remaining.calories) / Math.max(remaining.calories, 1);
      return { recipe: r, score: proteinDiff * 3 + calorieDiff };
    })
    .sort((a, b) => a.score - b.score)
    .slice(0, 3)
    .map(s => s.recipe);
}

// ---------------------------------------------------------------------------
// Recipe picker modal
// ---------------------------------------------------------------------------

function openModal(day, meal) {
  modalDay           = day;
  modalMeal          = meal;
  modalSectionFilter = meal;
  document.getElementById('modal-search-input').value = '';
  document.getElementById('modal-title').textContent  = `${day} – ${meal.charAt(0).toUpperCase() + meal.slice(1)}`;
  document.querySelectorAll('.modal-filter-btn').forEach(b =>
    b.classList.toggle('modal-filter-btn--active', b.dataset.section === meal)
  );
  filterModal('');
  document.getElementById('modal-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-search-input').focus(), 50);
}

function setModalFilter(section) {
  modalSectionFilter = section;
  document.querySelectorAll('.modal-filter-btn').forEach(b =>
    b.classList.toggle('modal-filter-btn--active', b.dataset.section === section)
  );
  filterModal(document.getElementById('modal-search-input').value);
}

function closeModal(event) {
  if (event.target === document.getElementById('modal-overlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal-overlay').style.display = 'none';
  modalDay  = null;
  modalMeal = null;
}

function filterModal(query) {
  const q         = query.toLowerCase();
  const currentId = currentPlan[`${modalDay}-${modalMeal}`];
  const filtered  = allRecipes.filter(r => {
    const matchSection = modalSectionFilter === 'all' || r.section === modalSectionFilter;
    const matchQuery   = !q || r.title.toLowerCase().includes(q) || r.section.toLowerCase().includes(q);
    return matchSection && matchQuery;
  });

  let html = currentId ? `<div class="modal-remove" onclick="clearSlotFromModal()">Remove recipe</div>` : '';

  // Suggestions only for empty slots with no active search query
  if (!currentId && !q) {
    const suggestions = getSuggestions(modalDay, modalMeal);
    if (suggestions.length) {
      html += `<div class="modal-suggestions">
        <p class="modal-suggestions-label">Suggested for you</p>
        ${suggestions.map(r => `
          <div class="modal-recipe modal-recipe--suggested" onclick="selectRecipe(${r.id})">
            <div class="modal-recipe-title">${escapeHtml(r.title)}</div>
            <div class="modal-recipe-meta">${escapeHtml(r.section)} &middot; ${r.macrosPerPortion.calories} kcal &middot; ${r.macrosPerPortion.protein}g protein &middot; ${escapeHtml(r.cookTime)}</div>
          </div>`).join('')}
      </div>
      <p class="modal-full-list-label">All ${modalMeal} recipes</p>`;
    }
  }

  html += filtered.map(r => `
    <div class="modal-recipe ${r.id === currentId ? 'modal-recipe--selected' : ''}" onclick="selectRecipe(${r.id})">
      <div class="modal-recipe-title">${escapeHtml(r.title)}</div>
      <div class="modal-recipe-meta">${escapeHtml(r.section)} &middot; ${r.macrosPerPortion.calories} kcal &middot; ${r.macrosPerPortion.protein}g protein &middot; ${escapeHtml(r.cookTime)}</div>
    </div>`).join('');

  document.getElementById('modal-list').innerHTML = html;
}

async function selectRecipe(id) {
  const key = `${modalDay}-${modalMeal}`;
  currentPlan[key] = id;
  try {
    await savePlanSlot(weekKey(currentWeekOffset), key, id);
  } catch(e) {
    showPlannerError('Could not save slot: ' + e.message);
  }
  closeModalDirect();
  renderWeek();
}

async function clearSlotFromModal() {
  const key = `${modalDay}-${modalMeal}`;
  delete currentPlan[key];
  try {
    await savePlanSlot(weekKey(currentWeekOffset), key, null);
  } catch(e) {
    showPlannerError('Could not clear slot: ' + e.message);
  }
  closeModalDirect();
  renderWeek();
}

// ---------------------------------------------------------------------------
// Copy modals
// ---------------------------------------------------------------------------

function openCopySlotModal(day, meal, recipeId) {
  copyMode         = 'slot';
  copySlotDay      = day;
  copySlotMeal     = meal;
  copySlotRecipeId = recipeId;
  const recipe     = allRecipes.find(r => r.id === recipeId);
  document.getElementById('copy-modal-title').textContent = 'Copy to other days';
  document.getElementById('copy-modal-body').innerHTML = `
    <p class="copy-modal-desc">Copy <strong>${recipe ? escapeHtml(recipe.title) : 'this recipe'}</strong> to the ${escapeHtml(meal)} slot on:</p>
    ${DAYS.filter(d => d !== day).map(d => `
      <label class="copy-day-label">
        <input type="checkbox" value="${d}"> ${d}
      </label>`).join('')}`;
  document.getElementById('copy-modal-overlay').style.display = 'flex';
}

function openCopyDayModal(day) {
  copyMode    = 'day';
  copyFromDay = day;
  document.getElementById('copy-modal-title').textContent = `Copy ${day} to other days`;
  document.getElementById('copy-modal-body').innerHTML = `
    <p class="copy-modal-desc">Copy all filled slots from <strong>${day}</strong> to:</p>
    ${DAYS.filter(d => d !== day).map(d => `
      <label class="copy-day-label">
        <input type="checkbox" value="${d}"> ${d}
      </label>`).join('')}`;
  document.getElementById('copy-modal-overlay').style.display = 'flex';
}

async function confirmCopy() {
  const checked    = [...document.querySelectorAll('#copy-modal-body input[type="checkbox"]:checked')].map(cb => cb.value);
  // Snapshot state before closeCopyModalDirect() nulls the module-level vars
  const mode       = copyMode;
  const slotMeal   = copySlotMeal;
  const slotRecipe = copySlotRecipeId;
  const fromDay    = copyFromDay;
  closeCopyModalDirect();
  if (!checked.length) return;
  const wk = weekKey(currentWeekOffset);
  if (mode === 'slot') {
    for (const day of checked) {
      const key = `${day}-${slotMeal}`;
      currentPlan[key] = slotRecipe;
      await savePlanSlot(wk, key, slotRecipe);
    }
  } else if (mode === 'day') {
    for (const targetDay of checked) {
      for (const meal of MEALS) {
        const sourceKey = `${fromDay}-${meal}`;
        const targetKey = `${targetDay}-${meal}`;
        const recipeId  = currentPlan[sourceKey];
        if (recipeId) {
          currentPlan[targetKey] = recipeId;
          await savePlanSlot(wk, targetKey, recipeId);
        } else {
          delete currentPlan[targetKey];
          await savePlanSlot(wk, targetKey, null);
        }
      }
    }
  }
  renderWeek();
}

function closeCopyModal(event) {
  if (event.target === document.getElementById('copy-modal-overlay')) closeCopyModalDirect();
}

function closeCopyModalDirect() {
  document.getElementById('copy-modal-overlay').style.display = 'none';
  copyMode         = null;
  copySlotDay      = null;
  copySlotMeal     = null;
  copySlotRecipeId = null;
  copyFromDay      = null;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModalDirect(); closeCopyModalDirect(); }
});

async function onAuthStateChange() {
  if (isLoggedIn()) userProfile = await getProfile();
  currentPlan = await getPlanSync(weekKey(currentWeekOffset));
  renderWeek();
}

async function init() {
  await initAuth();
  [allRecipes, currentPlan, userProfile] = await Promise.all([
    fetchAllRecipes(),
    getPlanSync(weekKey(currentWeekOffset)),
    isLoggedIn() ? getProfile() : Promise.resolve(null)
  ]);
  renderWeek();
}

init();
</script>
</body>
</html>
