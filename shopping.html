<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping List — FatScran</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Fat<span class="logo-scran">Scran</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Recipes</a></li>
      <li><a href="shopping.html" class="active">Shopping List</a></li>
    </ul>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Shopping List</h1>
    <p>Recipes you've added this week.</p>
  </div>
  <div class="shopping-layout" id="shopping-layout"></div>
</main>

<script src="recipes.js"></script>
<script>
  const CATEGORY_ORDER = ['meat','fish','dairy','veg','fruit','carbs','tins','sauces','spices','other'];

  function getList() { try { return JSON.parse(localStorage.getItem('fatscran-list') || '[]'); } catch(e) { return []; } }
  function saveList(list) { localStorage.setItem('fatscran-list', JSON.stringify(list)); }
  function getChecked() { try { return JSON.parse(localStorage.getItem('fatscran-checked') || '[]'); } catch(e) { return []; } }
  function saveChecked(checked) { localStorage.setItem('fatscran-checked', JSON.stringify(checked)); }

  function guessCategory(name) {
    const n = name.toLowerCase();
    if (/chicken|beef|lamb|mince|bacon|sausage|pepperoni/.test(n)) return 'meat';
    if (/salmon|fish|tuna/.test(n)) return 'fish';
    if (/cheese|yogurt|yoghurt|milk|cream|butter|egg/.test(n)) return 'dairy';
    if (/onion|garlic|pepper|carrot|broccoli|spinach|lettuce|tomato|celery|coleslaw|beans|peas|cucumber|mushroom/.test(n)) return 'veg';
    if (/lime|lemon/.test(n)) return 'fruit';
    if (/rice|pasta|noodle|tortilla|muffin|bun|flour|cornflake/.test(n)) return 'carbs';
    if (/can|tin|passata|coconut|evaporated|stock/.test(n)) return 'tins';
    if (/sauce|paste|ketchup|mayo|relish|vinegar|honey|ketjap|teriyaki|harissa|chipotle|pizza/.test(n)) return 'sauces';
    if (/powder|spice|cumin|paprika|chili|chilli|salt|oregano|basil|thyme|garam|coriander|herb|seasoning|sesame|yeast/.test(n)) return 'spices';
    return 'other';
  }

  function buildIngredients(list) {
    const merged = {};
    for (const item of list) {
      const recipe = recipes.find(r => r.id === item.id);
      if (!recipe) continue;
      const scale = item.portions / recipe.basePortions;
      for (const ing of recipe.ingredients) {
        const key = ing.name.toLowerCase();
        if (!merged[key]) merged[key] = { name: ing.name, category: guessCategory(ing.name), unit: ing.unit, total: 0, isToTaste: ing.amount === null };
        if (ing.amount !== null) merged[key].total += ing.amount * scale;
      }
    }
    const byCategory = {};
    for (const item of Object.values(merged)) {
      const cat = item.category;
      if (!byCategory[cat]) byCategory[cat] = [];
      const qty = item.isToTaste ? 'to taste' : (Math.round(item.total * 10) / 10) + ' ' + item.unit;
      byCategory[cat].push({ name: item.name, qty, key: item.name.toLowerCase() });
    }
    return byCategory;
  }

  function toggleCheck(key) {
    const checked = getChecked();
    const idx = checked.indexOf(key);
    if (idx === -1) { checked.push(key); } else { checked.splice(idx, 1); }
    saveChecked(checked);
    renderIngredientList();
  }

  function renderIngredientList() {
    const byCategory = buildIngredients(getList());
    const checked = getChecked();
    const el = document.getElementById('ingredient-list');
    if (!el) return;
    const keys = Object.keys(byCategory);
    if (keys.length === 0) { el.innerHTML = '<div class="empty-state"><p>No ingredients yet.</p></div>'; return; }
    const orderedKeys = CATEGORY_ORDER.filter(c => byCategory[c]).concat(keys.filter(k => !CATEGORY_ORDER.includes(k)));
    el.innerHTML = orderedKeys.map(cat => `
      <div class="category-group">
        <p class="cat-title">${cat.charAt(0).toUpperCase() + cat.slice(1)}</p>
        <ul class="item-list">
          ${byCategory[cat].map(item => `
            <li onclick="toggleCheck('${item.key}')" style="cursor:pointer;display:flex;align-items:center;gap:10px;${checked.includes(item.key) ? 'opacity:0.4;' : ''}">
              <span style="flex-shrink:0;width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;background:${checked.includes(item.key) ? 'var(--accent)' : 'transparent'};color:#fff;font-size:11px;">${checked.includes(item.key) ? '✓' : ''}</span>
              <span style="flex:1;${checked.includes(item.key) ? 'text-decoration:line-through;' : ''}">${item.name}</span>
              <span class="item-qty">${item.qty}</span>
            </li>`).join('')}
        </ul>
      </div>`).join('');
  }

  function removeItem(id) {
    const list = getList().filter(i => i.id !== id);
    saveList(list);
    render();
  }

  function updatePortions(id, val) {
    const list = getList();
    const item = list.find(i => i.id === id);
    if (item) { item.portions = Math.max(1, parseInt(val) || 1); saveList(list); }
    render();
  }

  function clearAll() {
    saveList([]);
    saveChecked([]);
    render();
  }

  function render() {
    const layout = document.getElementById('shopping-layout');
    const list = getList();

    if (list.length === 0) {
      layout.innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--muted)">
          <p style="font-size:1.05rem;font-weight:700;margin-bottom:0.4rem">No recipes added yet</p>
          <p>Open a recipe and press "Add to shopping list".</p>
          <a href="index.html" style="display:inline-block;margin-top:1rem;padding:10px 24px;background:var(--accent);color:#FAF7F2;border-radius:var(--radius-sm);text-decoration:none;font-weight:600;font-family:'DM Sans',sans-serif;font-size:0.875rem;">Browse recipes</a>
        </div>`;
      return;
    }

    const recipeRows = list.map(item => {
      const recipe = recipes.find(r => r.id === item.id);
      if (!recipe) return '';
      return `
        <div class="picker-item" style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
          <a href="recipe.html?id=${recipe.id}" style="text-decoration:none;color:inherit;flex:1;min-width:0;">
            <span class="picker-name" style="display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${recipe.title}</span>
            <span class="picker-detail">${recipe.section}</span>
          </a>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
            <button onclick="updatePortions(${recipe.id}, ${item.portions - 1})" style="width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text);font-size:15px;cursor:pointer;line-height:1;">−</button>
            <span style="font-size:0.875rem;font-weight:700;min-width:20px;text-align:center;color:var(--text);">${item.portions}</span>
            <button onclick="updatePortions(${recipe.id}, ${item.portions + 1})" style="width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text);font-size:15px;cursor:pointer;line-height:1;">+</button>
            <span style="font-size:0.75rem;color:var(--muted);">portions</span>
            <button onclick="removeItem(${recipe.id})" style="padding:4px 10px;border:1px solid #F5C5B8;background:#FDF0EB;color:#9B3A20;border-radius:var(--radius-sm);font-size:0.75rem;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;">Remove</button>
          </div>
        </div>`;
    }).join('');

    layout.innerHTML = `
      <div class="panel shopping-picker-panel">
        <div class="panel-header">
          <h2>This week</h2>
          <div class="panel-actions">
            <button class="btn-sm" style="color:#9B3A20;border-color:#F5C5B8;" onclick="clearAll()">Clear list</button>
          </div>
        </div>
        <div class="recipe-picker">${recipeRows}</div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <h2>Your shopping list</h2>
          <div class="panel-actions">
            <button class="btn-sm btn-primary" onclick="window.print()">Print</button>
          </div>
        </div>
        <div class="list-content" id="ingredient-list"></div>
      </div>`;

    renderIngredientList();
  }

  render();
</script>
</body>
</html>
