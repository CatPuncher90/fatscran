<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping List — FatScran</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Fat<span class="logo-scran">Scran</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Recipes</a></li>
      <li><a href="shopping.html" class="active">Shopping List</a></li>
    </ul>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Shopping List</h1>
    <p>Tick the recipes you're making this week and get a combined ingredient list.</p>
  </div>
  <div class="shopping-layout" id="shopping-layout"></div>
</main>

<script src="recipes.js"></script>
<script>
  const layout = document.getElementById('shopping-layout');

  const CATEGORY_ORDER = ['meat','fish','dairy','veg','fruit','carbs','tins','sauces','spices','other'];

  function guessCategory(name) {
    const n = name.toLowerCase();
    if (/chicken|beef|lamb|mince|bacon|sausage|pepperoni/.test(n)) return 'meat';
    if (/salmon|fish|tuna/.test(n)) return 'fish';
    if (/cheese|yogurt|yoghurt|milk|cream|butter|egg/.test(n)) return 'dairy';
    if (/onion|garlic|pepper|carrot|broccoli|spinach|lettuce|tomato|celery|coleslaw|beans|peas|cucumber|mushroom/.test(n)) return 'veg';
    if (/lime|lemon/.test(n)) return 'fruit';
    if (/rice|pasta|noodle|tortilla|muffin|bun|flour|cornflake/.test(n)) return 'carbs';
    if (/can|tin|passata|coconut|evaporated|stock/.test(n)) return 'tins';
    if (/sauce|paste|ketchup|mayo|relish|vinegar|honey|ketjap|teriyaki|harissa|chipotle|pizza/.test(n)) return 'sauces';
    if (/powder|spice|spices|cumin|paprika|chili|chilli|pepper|salt|oregano|basil|thyme|garam|coriander|turmeric|herb|seasoning|sesame|yeast/.test(n)) return 'spices';
    return 'other';
  }

  function buildList(selected, portions) {
    const merged = {};
    for (const recipe of selected) {
      const p = portions[recipe.id] || recipe.basePortions;
      const scale = p / recipe.basePortions;
      for (const ing of recipe.ingredients) {
        const key = ing.name.toLowerCase();
        if (!merged[key]) merged[key] = { name: ing.name, category: guessCategory(ing.name), unit: ing.unit, total: 0, isToTaste: ing.amount === null };
        if (ing.amount !== null) merged[key].total += ing.amount * scale;
      }
    }

    const byCategory = {};
    for (const item of Object.values(merged)) {
      const cat = item.category;
      if (!byCategory[cat]) byCategory[cat] = [];
      const qty = item.isToTaste ? 'to taste' : (Math.round(item.total * 10) / 10) + ' ' + item.unit;
      byCategory[cat].push({ name: item.name, qty });
    }
    return byCategory;
  }

  function renderList(byCategory) {
    const panel = document.getElementById('list-panel');
    const keys = Object.keys(byCategory);
    if (keys.length === 0) {
      panel.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><p>Select recipes on the left to build your shopping list.</p></div>`;
      return;
    }
    const orderedKeys = CATEGORY_ORDER.filter(c => byCategory[c]).concat(keys.filter(k => !CATEGORY_ORDER.includes(k)));
    panel.innerHTML = orderedKeys.map(cat => `
      <div class="category-group">
        <p class="cat-title">${cat.charAt(0).toUpperCase() + cat.slice(1)}</p>
        <ul class="item-list">
          ${byCategory[cat].map(item => `<li><span>${item.name}</span><span class="item-qty">${item.qty}</span></li>`).join('')}
        </ul>
      </div>`).join('');
  }

  function getPortions() {
    const p = {};
    recipes.forEach(r => {
      const el = document.getElementById('portions-' + r.id);
      p[r.id] = el ? parseInt(el.value) || r.basePortions : r.basePortions;
    });
    return p;
  }

  function getSelected() {
    return recipes.filter(r => { const cb = document.getElementById('pick-' + r.id); return cb && cb.checked; });
  }

  function onChange() { renderList(buildList(getSelected(), getPortions())); }

  function init() {
    const pickerItems = recipes.map(r => `
      <div class="picker-item">
        <input type="checkbox" id="pick-${r.id}" onchange="onChange()">
        <label for="pick-${r.id}">
          <span class="picker-name">${r.title}</span>
          <span class="picker-detail">${r.section} &middot; <input type="number" id="portions-${r.id}" value="${r.basePortions}" min="1" max="50" style="width:40px;border:1px solid #ccc;border-radius:4px;padding:1px 4px;font-size:12px;" onchange="onChange()" onclick="event.stopPropagation()"> portions &middot; ${r.macrosPerPortion.protein}g protein</span>
        </label>
      </div>`).join('');

    layout.innerHTML = `
      <div class="panel shopping-picker-panel">
        <div class="panel-header">
          <h2>Recipes</h2>
          <div class="panel-actions">
            <button class="btn-sm" onclick="selectAll()">Select all</button>
            <button class="btn-sm" onclick="clearAll()">Clear</button>
          </div>
        </div>
        <div class="recipe-picker">${pickerItems}</div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <h2>Your shopping list</h2>
          <div class="panel-actions">
            <button class="btn-sm btn-primary" onclick="window.print()">Print</button>
          </div>
        </div>
        <div class="list-content" id="list-panel">
          <div class="empty-state"><div class="empty-icon">🛒</div><p>Select recipes on the left to build your shopping list.</p></div>
        </div>
      </div>`;
  }

  function selectAll() { recipes.forEach(r => { const cb = document.getElementById('pick-' + r.id); if (cb) cb.checked = true; }); onChange(); }
  function clearAll() { recipes.forEach(r => { const cb = document.getElementById('pick-' + r.id); if (cb) cb.checked = false; }); onChange(); }

  init();
</script>
</body>
</html>
