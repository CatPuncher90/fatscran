<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FatScran — Shopping List</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/fatscran/sw.js');</script>
  <link rel="icon" type="image/png" href="fatscran-icon.png">
  <link rel="apple-touch-icon" href="fatscran-icon.png">
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Fat<span class="logo-scran">Scran</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Recipes</a></li>
      <li><a href="shopping.html" class="active">Shopping List</a></li>
      <li><a href="planner.html">Planner</a></li>
    </ul>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Shopping List</h1>
    <p>Recipes you've added this week.</p>
  </div>
  <div class="shopping-layout" id="shopping-layout"><div class="shopping-loading">Loading...</div></div>
</main>

<script src="recipes.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
const CATEGORY_ORDER = ['meat','fish','dairy','veg','fruit','carbs','tins','sauces','spices','other'];

function calcTotals(list) {
  let calories = 0, protein = 0, carbs = 0, fat = 0;
  for (const item of list) {
    const r = recipes.find(r => r.id === item.id);
    if (!r) continue;
    calories += r.macrosPerPortion.calories * item.portions;
    protein  += r.macrosPerPortion.protein  * item.portions;
    carbs    += r.macrosPerPortion.carbs    * item.portions;
    fat      += r.macrosPerPortion.fat      * item.portions;
  }
  return { calories: Math.round(calories), protein: Math.round(protein), carbs: Math.round(carbs), fat: Math.round(fat) };
}

function buildIngredients(list) {
  const merged = {};
  for (const item of list) {
    const recipe = recipes.find(r => r.id === item.id);
    if (!recipe) continue;
    const scale = item.portions / recipe.basePortions;
    for (const ing of recipe.ingredients) {
      const key = ing.name.toLowerCase();
      if (!merged[key]) merged[key] = { name: ing.name, category: guessCategory(ing.name), unit: ing.unit, total: 0, isToTaste: ing.amount === null };
      if (ing.amount !== null) merged[key].total += ing.amount * scale;
    }
  }
  const byCategory = {};
  for (const item of Object.values(merged)) {
    if (!byCategory[item.category]) byCategory[item.category] = [];
    const qty = item.isToTaste ? 'to taste' : (Math.round(item.total * 10) / 10) + ' ' + item.unit;
    byCategory[item.category].push({ name: item.name, qty, key: item.name.toLowerCase() });
  }
  return byCategory;
}

function toggleCheck(key) {
  const checked = getChecked();
  const idx = checked.indexOf(key);
  if (idx === -1) { checked.push(key); } else { checked.splice(idx, 1); }
  saveChecked(checked);
  renderIngredientList();
}

function renderIngredientList() {
  const byCategory  = buildIngredients(window._currentList || []);
  const checked     = getChecked();
  const el          = document.getElementById('ingredient-list');
  if (!el) return;

  const keys = Object.keys(byCategory);
  if (!keys.length) { el.innerHTML = '<div class="empty-state"><p>No ingredients yet.</p></div>'; return; }

  const orderedKeys = CATEGORY_ORDER.filter(c => byCategory[c]).concat(keys.filter(k => !CATEGORY_ORDER.includes(k)));
  el.innerHTML = orderedKeys.map(cat => `
    <div class="category-group">
      <p class="cat-title">${cat.charAt(0).toUpperCase() + cat.slice(1)}</p>
      <ul class="item-list">
        ${byCategory[cat].map(item => `
          <li onclick="toggleCheck('${item.key}')" class="ingredient-row ${checked.includes(item.key) ? 'ingredient-row--checked' : ''}">
            <span class="ingredient-checkbox ${checked.includes(item.key) ? 'ingredient-checkbox--checked' : ''}">${checked.includes(item.key) ? '&#10003;' : ''}</span>
            <span class="ingredient-name">${item.name}</span>
            <span class="item-qty">${item.qty}</span>
          </li>`).join('')}
      </ul>
    </div>`).join('');
}

async function removeItem(id) {
  await removeFromListSync(id);
  await render();
}

async function updatePortions(id, val) {
  const portions = Math.max(1, parseInt(val) || 1);
  const list = await getListSync();
  const item = list.find(i => i.id === id);
  if (item) { item.portions = portions; await saveListSync(list); }
  await render();
}

async function clearAll() {
  await saveListSync([]);
  saveChecked([]);
  await render();
}

async function render() {
  const layout = document.getElementById('shopping-layout');
  const list   = await getListSync();
  window._currentList = list;

  if (!list.length) {
    layout.innerHTML = `
      <div class="shopping-empty">
        <p class="shopping-empty__title">No recipes added yet</p>
        <p class="shopping-empty__body">Open a recipe and press "Add to list".</p>
        <a href="index.html" class="btn-primary-sm">Browse recipes</a>
      </div>`;
    return;
  }

  const totals     = calcTotals(list);
  const recipeRows = list.map(item => {
    const recipe = recipes.find(r => r.id === item.id);
    if (!recipe) return '';
    return `
      <div class="picker-item">
        <a href="recipe.html?id=${recipe.id}" class="picker-item__link">
          <span class="picker-name">${recipe.title}</span>
          <span class="picker-detail">${recipe.section} &middot; ${item.portions} portion${item.portions !== 1 ? 's' : ''} &middot; ${Math.round(recipe.macrosPerPortion.calories * item.portions)} kcal &middot; ${Math.round(recipe.macrosPerPortion.protein * item.portions)}g protein</span>
        </a>
        <div class="picker-item__controls">
          <button onclick="updatePortions(${recipe.id}, ${item.portions - 1})" class="portion-btn">&#8722;</button>
          <span class="portion-count">${item.portions}</span>
          <button onclick="updatePortions(${recipe.id}, ${item.portions + 1})" class="portion-btn">+</button>
          <span class="portion-label">portions</span>
          <button onclick="removeItem(${recipe.id})" class="remove-btn">Remove</button>
        </div>
      </div>`;
  }).join('');

  layout.innerHTML = `
    <div class="panel shopping-picker-panel">
      <div class="panel-header">
        <h2>This week</h2>
        <div class="panel-actions">
          <button class="btn-sm btn-danger" onclick="clearAll()">Clear list</button>
        </div>
      </div>
      <div class="recipe-picker">${recipeRows}</div>
      <div class="weekly-totals">
        <p class="weekly-totals__label">Weekly totals</p>
        <div class="weekly-totals__grid">
          <div class="weekly-total-item"><div class="weekly-total-value">${totals.calories.toLocaleString()}</div><div class="weekly-total-label">kcal</div></div>
          <div class="weekly-total-item"><div class="weekly-total-value">${totals.protein}g</div><div class="weekly-total-label">protein</div></div>
          <div class="weekly-total-item"><div class="weekly-total-value">${totals.carbs}g</div><div class="weekly-total-label">carbs</div></div>
          <div class="weekly-total-item"><div class="weekly-total-value">${totals.fat}g</div><div class="weekly-total-label">fat</div></div>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <h2>Your shopping list</h2>
        <div class="panel-actions">
          <button class="btn-sm btn-primary" onclick="window.print()">Print</button>
        </div>
      </div>
      <div class="list-content" id="ingredient-list"></div>
    </div>`;

  renderIngredientList();
}

async function onAuthStateChange() { await render(); }

async function init() {
  await initAuth();
  await render();
}

init();
</script>
</body>
</html>
