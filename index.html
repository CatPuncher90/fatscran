<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FatScran — High Protein Meal Prep</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/fatscran/sw.js');</script>
  <link rel="icon" type="image/png" href="fatscran-icon.png">
  <link rel="apple-touch-icon" href="fatscran-icon.png">
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Fat<span class="logo-scran">Scran</span></a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Recipes</a></li>
      <li><a href="shopping.html">Shopping List</a></li>
      <li><a href="planner.html">Planner</a></li>
    </ul>
  </div>
</nav>
<main>
  <div class="page-header">
    <h1>Meal Prep Recipes</h1>
    <p>High protein, batch-friendly meals to fuel your week.</p>
  </div>

  <div style="padding:0 0 1rem;display:flex;gap:0.75rem;align-items:center;">
    <input id="search-input" type="text" placeholder="Search recipes or ingredients..." oninput="applyFilters()" style="flex:1;box-sizing:border-box;">
    <select id="sort-select" onchange="applyFilters()" style="padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:0.875rem;font-family:'DM Sans',sans-serif;background:var(--bg-card);color:var(--text);cursor:pointer;outline:none;flex-shrink:0;">
      <option value="default">No sort</option>
      <option value="protein">Highest protein</option>
      <option value="calories">Lowest calories</option>
      <option value="cooktime">Quickest cook time</option>
    </select>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-section="all">All</button>
    <button class="filter-btn" data-section="breakfast">Breakfast</button>
    <button class="filter-btn" data-section="dinner">Dinner</button>
    <button class="filter-btn" data-section="tea">Tea</button>
    <button class="filter-btn" data-section="dessert">Dessert</button>
    <button class="filter-btn" data-section="favourites">♥ Favourites</button>
  </div>

  <p id="result-count" style="font-size:0.8125rem;color:var(--muted);margin-bottom:1rem;"></p>

  <div class="recipe-grid" id="recipe-grid"></div>
</main>
<script src="recipes.js"></script>
<script>
  const SECTION_ORDER = ['breakfast', 'dinner', 'tea', 'sauces', 'dessert'];

  function getFavourites() { try { return JSON.parse(localStorage.getItem('fatscran-favs') || '[]'); } catch(e) { return []; } }
  function saveFavourites(favs) { localStorage.setItem('fatscran-favs', JSON.stringify(favs)); }

  function toggleFav(id, event) {
    event.preventDefault();
    event.stopPropagation();
    const favs = getFavourites();
    const idx = favs.indexOf(id);
    if (idx === -1) { favs.push(id); } else { favs.splice(idx, 1); }
    saveFavourites(favs);
    applyFilters();
  }

  function recipeMatchesSearch(recipe, query) {
    if (!query) return true;
    const q = query.toLowerCase();
    if (recipe.title.toLowerCase().includes(q)) return true;
    return recipe.ingredients.some(i => i.name.toLowerCase().includes(q));
  }

  function badgeClass(section) { return 'badge badge-' + section.toLowerCase(); }

  function parseCookTime(str) {
    if (!str) return 9999;
    const hrs = (str.match(/(\d+)\s*hr/) || [0,0])[1];
    const mins = (str.match(/(\d+)\s*min/) || [0,0])[1];
    return parseInt(hrs) * 60 + parseInt(mins);
  }

  function sortWithinGroups(list, sortBy) {
    if (sortBy === 'default') return list;
    return list.slice().sort((a, b) => {
      if (a.section !== b.section) return SECTION_ORDER.indexOf(a.section) - SECTION_ORDER.indexOf(b.section);
      if (sortBy === 'protein') return b.macrosPerPortion.protein - a.macrosPerPortion.protein;
      if (sortBy === 'calories') return a.macrosPerPortion.calories - b.macrosPerPortion.calories;
      if (sortBy === 'cooktime') return parseCookTime(a.cookTime) - parseCookTime(b.cookTime);
      return 0;
    });
  }

  function groupBySection(list) {
    const groups = {};
    SECTION_ORDER.forEach(s => groups[s] = []);
    list.forEach(r => { if (groups[r.section]) groups[r.section].push(r); else groups[r.section] = [r]; });
    return SECTION_ORDER.flatMap(s => groups[s] || []);
  }

  function saveState() {
    sessionStorage.setItem('fatscran-state', JSON.stringify({
      section: activeSection,
      query: document.getElementById('search-input').value,
      sort: document.getElementById('sort-select').value
    }));
  }

  function restoreState() {
    try {
      const state = JSON.parse(sessionStorage.getItem('fatscran-state') || 'null');
      if (!state) return;
      activeSection = state.section || 'all';
      document.getElementById('search-input').value = state.query || '';
      document.getElementById('sort-select').value = state.sort || 'default';
      document.querySelectorAll('#filters .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.section === activeSection));
    } catch(e) {}
  }

  function renderCards(list) {
    const grid = document.getElementById('recipe-grid');
    const favs = getFavourites();
    const count = document.getElementById('result-count');

    if (list.length === 0) {
      grid.innerHTML = '<p class="no-results">No recipes found.</p>';
      count.textContent = '';
      return;
    }

    count.textContent = 'Showing ' + list.length + ' recipe' + (list.length === 1 ? '' : 's');

    grid.innerHTML = list.map(r => {
      const isFav = favs.includes(r.id);
      const imageBlock = r.image
        ? `<div style="width:100%;aspect-ratio:16/9;border-radius:var(--radius-sm);overflow:hidden;margin-bottom:0.75rem;"><img src="${r.image}" alt="${r.title}" style="width:100%;height:100%;object-fit:cover;display:block;"></div>`
        : '';
      return `
      <a class="recipe-card" href="recipe.html?id=${r.id}" onclick="saveState()" style="display:flex;flex-direction:column;">
        ${imageBlock}
        <div class="card-top">
          <span class="card-name">${r.title}</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <button onclick="toggleFav(${r.id}, event)" style="background:none;border:none;cursor:pointer;font-size:24px;line-height:1;padding:0;color:${isFav ? '#e85d5d' : 'var(--muted)'};">${isFav ? '♥' : '♡'}</button>
            <span class="${badgeClass(r.section)}">${r.section}</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:0.9rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span style="font-size:0.8125rem;font-weight:600;color:var(--text);">${r.cookTime}</span>
        </div>
        <div class="card-stats">
          <div class="stat-block"><span class="stat-value">${r.macrosPerPortion.calories}</span><span class="stat-label">kcal</span></div>
          <div class="stat-block"><span class="stat-value">${r.macrosPerPortion.protein}g</span><span class="stat-label">protein</span></div>
          <div class="stat-block"><span class="stat-value">${r.macrosPerPortion.carbs}g</span><span class="stat-label">carbs</span></div>
          <div class="stat-block"><span class="stat-value">${r.macrosPerPortion.fat}g</span><span class="stat-label">fat</span></div>
        </div>
        <div style="text-align:center;margin-top:0.4rem;padding-top:0.4rem;border-top:1px solid var(--border);"><span style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--muted);">per portion</span></div>
      </a>`;
    }).join('');
  }

  let activeSection = 'all';

  function applyFilters() {
    const query = document.getElementById('search-input').value;
    const sortBy = document.getElementById('sort-select').value;
    const favs = getFavourites();

    let filtered = recipes.filter(r =>
      (activeSection === 'all' || (activeSection === 'favourites' ? favs.includes(r.id) : r.section === activeSection)) &&
      recipeMatchesSearch(r, query)
    );

    if (sortBy === 'default') {
      filtered = groupBySection(filtered);
    } else {
      filtered = sortWithinGroups(filtered, sortBy);
    }

    renderCards(filtered);
  }

  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    activeSection = btn.dataset.section;
    document.querySelectorAll('#filters .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.section === activeSection));
    applyFilters();
  });

  if (!recipes.some(r => r.section === 'sauces')) {
    const saucesBtn = document.querySelector('.filter-btn[data-section="sauces"]');
    if (saucesBtn) saucesBtn.style.display = 'none';
  }

  restoreState();
  applyFilters();
</script>
</body>
</html>
